<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解答之書</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #3a4148 0%, #22272c 100%);
            display: grid;
            place-items: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            padding: 20px;
            outline: none; 
            font-family: 'Noto Serif TC', serif;
        }

        /* 3D 場景容器 */
        .scene {
            width: 600px; 
            height: 750px; 
            aspect-ratio: 4 / 5; 
            perspective: 2500px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 書本主體 */
        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }

        /* 打開時書本右移置中 */
        .book.open-book {
            transform: translateX(50%);
        }

        /* 預設為絕對定位重疊 */
        .page-component {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
        }

        /* ==================== 1. 雙面複合封面外殼 ==================== */
        .cover-wrapper {
            width: calc(100% + 6px);
            height: calc(100% + 6px);
            top: -3px;
            left: -3px;
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 封面正面 */
        .cover-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d0d0d 0%, #1c1c1c 100%);
            border-left: 22px solid #000; 
            border-radius: 0 16px 16px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px; 
            box-shadow: 25px 20px 50px rgba(0,0,0,0.65);
            backface-visibility: hidden;
        }

        /* 封面背面 */
        .cover-back-side {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #111111;
            border-right: 22px solid #000;
            border-radius: 16px 0 0 16px;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            box-shadow: -25px 20px 50px rgba(0,0,0,0.65);
            background-image: linear-gradient(to left, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 10%);
        }

        /* 【核心修改】古典花框：精確移除了四個角落類似問號的圈圈與線條 path */
        .gold-pattern {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #BDA369;
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none" stroke="white" stroke-width="3"><rect x="15" y="15" width="370" height="470" rx="4" stroke-width="4"/><rect x="25" y="25" width="350" height="450" rx="2" stroke-width="1.5"/><path d="M15,45 Q45,45 45,15 M385,45 Q355,45 355,15 M15,455 Q45,455 45,485 M385,455 Q355,455 355,485"/><path d="M160,22 L170,17 L230,17 L240,22 L230,27 L170,27 Z M160,478 L170,473 L230,473 L240,478 L230,483 L170,483 Z"/><path d="M22,160 L17,170 L17,230 L22,240 L27,230 L27,170 Z M378,160 L373,170 L373,230 L378,240 L383,230 L383,170 Z"/></svg>');
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none" stroke="white" stroke-width="3"><rect x="15" y="15" width="370" height="470" rx="4" stroke-width="4"/><rect x="25" y="25" width="350" height="450" rx="2" stroke-width="1.5"/><path d="M15,45 Q45,45 45,15 M385,45 Q355,45 355,15 M15,455 Q45,455 45,485 M385,455 Q355,455 355,485"/><path d="M160,22 L170,17 L230,17 L240,22 L230,27 L170,27 Z M160,478 L170,473 L230,473 L240,478 L230,483 L170,483 Z"/><path d="M22,160 L17,170 L17,230 L22,240 L27,230 L27,170 Z M378,160 L373,170 L373,230 L378,240 L383,230 L383,170 Z"/></svg>');
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 內容物容器 */
        .book-title-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            z-index: 2;
        }

        .book-title-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 書名 */
        .book-title {
            font-family: 'Noto Serif TC', serif;
            color: #BDA369;
            font-size: 3.8rem; 
            letter-spacing: 14px;
            text-align: center;
            line-height: 1.6;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9), 0 0 15px rgba(189, 163, 105, 0.3);
            font-weight: 700;
        }

        /* 副標題 */
        .book-subtitle {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 1.3rem; 
            color: #BDA369; 
            letter-spacing: 3px;
            margin-top: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            opacity: 0.85;
        }

        /* ==================== 2. 底層留白內頁 ==================== */
        .inner-page-stay {
            background-color: #fbf9f1;
            width: calc(100% - 2px);
            margin-left: 2px;
            border-radius: 0 14px 14px 0;
            z-index: 5;
            transform: rotateY(0deg);
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 80px; 
            overflow: hidden; 
            background-image: linear-gradient(to right, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.02) 6%, rgba(255,255,255,0.5) 9%, rgba(0,0,0,0) 15%);
            box-shadow: 5px 5px 30px rgba(0,0,0,0.4);
        }

        /* 雙語答案容器 */
        .answer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 90%;
            gap: 25px; 
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            user-select: none;
        }

        /* 英文在上 */
        .eng-text {
            color: #3b3121; 
            font-size: 1.25rem; 
            line-height: 1.6;
            letter-spacing: 2px;
            text-align: center;
            font-weight: 400;
            text-transform: uppercase; 
        }

        /* 中文在下 */
        .ch-text {
            color: #3b3121; 
            font-size: 1.15rem; 
            line-height: 1.8;
            letter-spacing: 4px; 
            text-align: center;
            font-weight: 600;
        }

        .show-text {
            opacity: 1;
        }

        /* ==================== 3. 封底 ==================== */
        .cover-back {
            background: #0d0d0d;
            border-radius: 0 16px 16px 0;
            z-index: 1;
        }

        /* 翻開狀態動畫 */
        .flipped {
            transform: rotateY(-170deg) !important;
        }

        /* ==================== 4. 手機版專屬優化佈局 ==================== */
        @media (max-width: 600px) {
            .scene {
                width: 88vw !important; 
                max-width: 380px !important; 
                height: auto !important;
                max-height: 65dvh !important; 
                aspect-ratio: 4 / 5 !important; 
                margin: 0 !important; 
                position: relative !important;
                top: 0 !important;
            }
            
            .book {
                transform: none !important;
                transition: none !important;
            }

            .cover-wrapper {
                width: 100% !important;
                height: 100% !important;
                top: 0 !important;
                left: 0 !important;
            }

            .page-component {
                position: absolute !important; 
                width: 100% !important;
                height: 100% !important;
                transform: none !important;
                top: 0 !important;
                left: 0 !important;
            }

            .cover-front {
                border-radius: 12px !important;
                border-left: none !important; 
                box-shadow: 0 15px 40px rgba(0,0,0,0.6) !important;
                padding: 15px !important; 
            }

            .gold-pattern {
                width: 100% !important;
                height: 100% !important;
            }

            .book-title {
                font-size: 2.2rem !important; 
                letter-spacing: 6px !important;
                line-height: 1.5 !important;
            }

            .book-subtitle {
                font-size: 0.8rem !important;
                margin-top: 5px !important;
            }

            .inner-page-stay {
                width: 100% !important;
                margin-left: 0 !important;
                border-radius: 12px !important;
                box-shadow: 0 15px 40px rgba(0,0,0,0.5) !important;
                background-image: none !important; 
                padding: 40px !important; 
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
            }
            
            .inner-page-stay.mobile-active {
                opacity: 1;
                pointer-events: auto;
                z-index: 12; 
            }

            .answer-container {
                gap: 15px !important;
            }

            .eng-text {
                font-size: 1.05rem !important;
            }

            .ch-text {
                font-size: 0.95rem !important;
                letter-spacing: 3px !important;
            }

            .cover-back-side, .cover-back {
                display: none !important;
            }
        }
    </style>
</head>
<body tabindex="0">

    <div class="scene">
        <div class="book" id="magicBook" onclick="toggleBook()">
            
            <div class="page-component cover-wrapper" id="frontCover">
                <div class="cover-front">
                    <div class="gold-pattern"></div>
                    <div class="book-title-container">
                        <div class="book-title-area">
                            <div class="book-title">解答之書</div>
                            <div class="book-subtitle">THE BOOK OF ANSWERS</div>
                        </div>
                    </div>
                </div>
                <div class="cover-back-side"></div>
            </div>

            <div class="page-component inner-page-stay" id="innerPage">
                <div class="answer-container" id="answerBox">
                    <div class="eng-text" id="engText"></div>
                    <div class="ch-text" id="chText">載入中...</div>
                </div>
            </div>

            <div class="page-component cover-back"></div>

        </div>
    </div>

    <script>
        let isOpen = false;
        let chTruths = [];
        let engTruths = [];

        // 讀取外部資料夾的 truth.json 與 EngTruth.json
        async function loadAllAnswers() {
            try {
                const [chRes, engRes] = await Promise.all([
                    fetch('truth.json'),
                    fetch('EngTruth.json')
                ]);
                
                const chData = await chRes.json();
                const engData = await engRes.json();
                
                chTruths = chData.truth;
                engTruths = engData.truth;

                document.getElementById('chText').textContent = "";
            } catch (error) {
                console.error("讀取 JSON 檔案失敗：", error);
                document.getElementById('chText').textContent = "未能讀取到中英文答案庫";
            }
        }

        async function toggleBook() {
            const book = document.getElementById('magicBook');
            const frontCover = document.getElementById('frontCover');
            const innerPage = document.getElementById('innerPage');
            const answerBox = document.getElementById('answerBox');

            const isMobile = window.innerWidth <= 600;

            if (chTruths.length === 0 || engTruths.length === 0) {
                await loadAllAnswers();
            }

            if (!isOpen) {
                // 翻開時隨機選取一個索引值，同時讀取中文與英文
                if (chTruths.length > 0 && engTruths.length > 0) {
                    const minLength = Math.min(chTruths.length, engTruths.length);
                    const randomIndex = Math.floor(Math.random() * minLength);
                    
                    document.getElementById('engText').textContent = engTruths[randomIndex];
                    document.getElementById('chText').textContent = chTruths[randomIndex];
                }

                if (isMobile) {
                    innerPage.classList.add('mobile-active');
                    answerBox.classList.add('show-text');
                } else {
                    book.classList.add('open-book');
                    frontCover.classList.add('flipped');
                    setTimeout(() => {
                        answerBox.classList.add('show-text');
                    }, 300);
                }
                isOpen = true;
            } else {
                if (isMobile) {
                    answerBox.classList.remove('show-text');
                    innerPage.classList.remove('mobile-active');
                } else {
                    answerBox.classList.remove('show-text');
                    setTimeout(() => {
                        frontCover.classList.remove('flipped');
                        book.classList.remove('open-book');
                    }, 100);
                }
                isOpen = false;
            }
        }

        window.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Spacebar' || e.code === 'Space' || e.keyCode === 32) {
                e.preventDefault(); 
                toggleBook();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadAllAnswers();
            document.body.focus();
        });
    </script>
</body>
</html>
