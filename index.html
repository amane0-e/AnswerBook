<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解答之書</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #3a4148 0%, #22272c 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Serif TC', serif;
            overflow: hidden;
            padding: 20px;
        }

        /* 3D 場景容器（電腦版尺寸） */
        .scene {
            width: 100%;
            max-width: 450px;
            height: 75vh;
            max-height: 650px;
            perspective: 2000px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 書本主體 */
        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }

        /* 【電腦版專屬】打開時書本右移置中 */
        .book.open-book {
            transform: translateX(50%);
        }

        /* 電腦版預設為絕對定位重疊 */
        .page-component {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
        }

        /* ==================== 1. 雙面複合封面外殼 ==================== */
        .cover-wrapper {
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 封面正面：黑色皮質與雙線燙金 */
        .cover-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d0d0d 0%, #1c1c1c 100%);
            border-left: 15px solid #000;
            border-radius: 0 12px 12px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-shadow: 15px 10px 35px rgba(0,0,0,0.6);
            backface-visibility: hidden;
        }

        /* 封面背面（電腦版用） */
        .cover-back-side {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #111111;
            border-right: 15px solid #000;
            border-radius: 12px 0 0 12px;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            box-shadow: -15px 10px 35px rgba(0,0,0,0.6);
            background-image: linear-gradient(to left, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 10%);
        }

        /* 燙金核心設計：採用完美垂直分配，避免花紋被擠壓 */
        .gold-pattern {
            width: 100%;
            height: 100%;
            border: 4px double #d4af37;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            box-shadow: inset 0 0 25px rgba(212,175,55,0.15);
        }

        .diamond-icon {
            color: #d4af37;
            font-size: 1.8rem;
            text-shadow: 0 0 6px rgba(212,175,55,0.6);
            user-select: none;
        }

        .book-title-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .book-title {
            color: #d4af37;
            font-size: 2.8rem;
            letter-spacing: 8px;
            text-align: center;
            line-height: 1.8;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9), 0 0 10px rgba(212,175,55,0.4);
        }

        .book-subtitle {
            font-size: 1rem; 
            color: #b8972f; 
            letter-spacing: 2px;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* ==================== 2. 底層留白內頁 ==================== */
        .inner-page-stay {
            background-color: #fbf9f1;
            border-radius: 0 8px 8px 0;
            z-index: 5;
            transform: rotateY(0deg);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-image: linear-gradient(to right, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.02) 6%, rgba(255,255,255,0.5) 9%, rgba(0,0,0,0) 15%);
            box-shadow: 5px 5px 30px rgba(0,0,0,0.4);
        }

        /* 答案文字樣式 */
        .answer-text {
            color: #5a4b32;
            font-size: 2rem;
            line-height: 1.6;
            letter-spacing: 2px;
            text-align: center;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            max-width: 90%;
            user-select: none;
            word-break: break-all;
        }

        .show-text {
            opacity: 1;
        }

        /* ==================== 3. 封底 ==================== */
        .cover-back {
            background: #0d0d0d;
            border-radius: 0 12px 12px 0;
            z-index: 1;
        }

        /* 【電腦版專屬】翻開狀態動畫 */
        .flipped {
            transform: rotateY(-170deg) !important;
        }

        /* ==================== 4. 終極手機版防變形佈局 (螢幕寬度小於 600px) ==================== */
        @media (max-width: 600px) {
            .scene {
                width: 85vw !important; /* 控制手機版寬度不貼邊 */
                max-width: 360px !important;
                height: auto !important;
                max-height: none !important;
                aspect-ratio: 9 / 16 !important; /* 強制重現極具質感的修長黃金比例 */
            }
            
            .book {
                transform: none !important;
                transition: none !important;
            }

            .page-component {
                position: relative !important;
                width: 100% !important;
                height: 100% !important;
                transform: none !important;
            }

            .cover-front {
                position: relative !important;
                border-radius: 12px !important;
                border-left: none !important; /* 手機版採平面化，不留單邊厚書脊 */
                box-shadow: 0 15px 40px rgba(0,0,0,0.6) !important;
                padding: 25px !important;
            }

            .gold-pattern {
                padding: 30px 15px !important;
            }

            .book-title {
                font-size: 2.2rem !important;
                letter-spacing: 6px !important;
            }

            .book-subtitle {
                font-size: 0.85rem !important;
            }

            .inner-page-stay {
                display: none; 
                border-radius: 12px !important;
                box-shadow: 0 15px 40px rgba(0,0,0,0.5) !important;
                background-image: none !important; 
                padding: 30px !important;
            }

            .answer-text {
                font-size: 1.6rem !important;
            }

            .cover-back-side, .cover-back {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="book" id="magicBook" onclick="toggleBook()">
            
            <div class="page-component cover-wrapper" id="frontCover">
                <div class="cover-front">
                    <div class="gold-pattern">
                        <div class="diamond-icon">❖</div>
                        <div class="book-title-area">
                            <div class="book-title">解答之書</div>
                            <div class="book-subtitle">THE BOOK OF ANSWERS</div>
                        </div>
                        <div class="diamond-icon">❖</div>
                    </div>
                </div>
                <div class="cover-back-side"></div>
            </div>

            <div class="page-component inner-page-stay" id="innerPage">
                <div class="answer-text" id="answerBox">載入中...</div>
            </div>

            <div class="page-component cover-back"></div>

        </div>
    </div>

    <script>
        let isOpen = false;
        let truths = [];

        async function loadAnswers() {
            try {
                const response = await fetch('truth.json');
                const data = await response.json();
                truths = data.truth;
                document.getElementById('answerBox').textContent = "";
            } catch (error) {
                console.error("無法讀取 JSON 檔案：", error);
                document.getElementById('answerBox').textContent = "未能讀取到答案庫";
            }
        }

        async function toggleBook() {
            const book = document.getElementById('magicBook');
            const frontCover = document.getElementById('frontCover');
            const innerPage = document.getElementById('innerPage');
            const answerBox = document.getElementById('answerBox');

            const isMobile = window.innerWidth <= 600;

            if (truths.length === 0) {
                await loadAnswers();
            }

            if (!isOpen) {
                if (truths.length > 0) {
                    const randomIndex = Math.floor(Math.random() * truths.length);
                    answerBox.textContent = truths[randomIndex];
                }

                if (isMobile) {
                    frontCover.style.display = 'none';
                    innerPage.style.display = 'flex';
                    answerBox.classList.add('show-text');
                } else {
                    book.classList.add('open-book');
                    frontCover.classList.add('flipped');
                    setTimeout(() => {
                        answerBox.classList.add('show-text');
                    }, 300);
                }

                isOpen = true;
            } else {
                if (isMobile) {
                    answerBox.classList.remove('show-text');
                    innerPage.style.display = 'none';
                    frontCover.style.display = 'block';
                } else {
                    answerBox.classList.remove('show-text');
                    setTimeout(() => {
                        frontCover.classList.remove('flipped');
                        book.classList.remove('open-book');
                    }, 100);
                }

                isOpen = false;
            }
        }

        loadAnswers();
    </script>
</body>
</html>
