<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解答之書</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #3a4148 0%, #22272c 100%);
            /* 使用 Grid 佈局提供極致精準的雙軸（上下左右）絕對置中 */
            display: grid;
            place-items: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            padding: 20px;
        }

        /* 3D 場景容器 */
        .scene {
            width: 100%;
            /* 【核心修改】大幅放寬電腦版最大寬度與高度限制，讓 4:5 的大氣分量完全釋放 */
            max-width: 720px; 
            height: 75vh; /* 預設在電腦上吃滿螢幕高度的 75%，變得非常有感、飽滿 */
            max-height: 900px; 
            
            /* 強制鎖定在 4:5 的經典扎實書本比例 */
            aspect-ratio: 4 / 5; 
            
            perspective: 2500px; /* 放大場景，讓大書本的 3D 效果更立體 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 書本主體 */
        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }

        /* 【電腦版專屬】打開時書本右移置中 */
        .book.open-book {
            transform: translateX(50%);
        }

        /* 電腦版預設為絕對定位重疊 */
        .page-component {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
        }

        /* ==================== 1. 雙面複合封面外殼 ==================== */
        .cover-wrapper {
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 封面正面：黑色皮質與雙線燙金 */
        .cover-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d0d0d 0%, #1c1c1c 100%);
            border-left: 20px solid #000; /* 隨著書本變大，增加書脊厚度感 */
            border-radius: 0 16px 16px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 45px; /* 加大內邊距 */
            box-shadow: 20px 15px 45px rgba(0,0,0,0.6);
            backface-visibility: hidden;
        }

        /* 封面背面（電腦版翻開後呈現在左側的皮質內襯） */
        .cover-back-side {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #111111;
            border-right: 20px solid #000;
            border-radius: 16px 0 0 16px;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            box-shadow: -20px 15px 45px rgba(0,0,0,0.6);
            background-image: linear-gradient(to left, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 10%);
        }

        /* 燙金核心設計 */
        .gold-pattern {
            width: 100%;
            height: 100%;
            border: 5px double #d4af37; /* 稍微加粗金線，更顯尊貴 */
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 30px; 
            box-shadow: inset 0 0 35px rgba(212,175,55,0.15);
        }

        .diamond-icon {
            color: #d4af37;
            font-size: 2.2rem; /* 配合大書本放大符號 */
            text-shadow: 0 0 8px rgba(212,175,55,0.6);
            user-select: none;
        }

        .book-title-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .book-title {
            color: #d4af37;
            font-size: 3.6rem; /* 電腦版標題霸氣放大 */
            letter-spacing: 12px;
            text-align: center;
            line-height: 1.6;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9), 0 0 15px rgba(212,175,55,0.4);
        }

        .book-subtitle {
            font-size: 1.25rem; 
            color: #b8972f; 
            letter-spacing: 3px;
            margin-top: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* ==================== 2. 底層留白內頁 ==================== */
        .inner-page-stay {
            background-color: #fbf9f1;
            border-radius: 0 12px 12px 0;
            z-index: 5;
            transform: rotateY(0deg);
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 60px;
            background-image: linear-gradient(to right, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.02) 6%, rgba(255,255,255,0.5) 9%, rgba(0,0,0,0) 15%);
            box-shadow: 5px 5px 30px rgba(0,0,0,0.4);
        }

        /* 答案文字樣式 */
        .answer-text {
            color: #5a4b32;
            font-size: 2.6rem; /* 答案字體同步放大 */
            line-height: 1.6;
            letter-spacing: 3px;
            text-align: center;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            max-width: 85%;
            user-select: none;
            word-break: break-all;
        }

        .show-text {
            opacity: 1;
        }

        /* ==================== 3. 封底 ==================== */
        .cover-back {
            background: #0d0d0d;
            border-radius: 0 16px 16px 0;
            z-index: 1;
        }

        /* 【電腦版專屬】翻開狀態動畫 */
        .flipped {
            transform: rotateY(-170deg) !important;
        }

        /* ==================== 4. 手機版專屬優化佈局 (螢幕寬度小於 600px) ==================== */
        @media (max-width: 600px) {
            .scene {
                width: 88vw !important; 
                max-width: 380px !important; 
                height: auto !important;
                max-height: 65dvh !important; 
                
                /* 手機版依然精準鎖定在 4:5 比例，但大小受限於安全邊框 */
                aspect-ratio: 4 / 5 !important; 
                
                margin: 0 !important; 
                position: relative !important;
                top: 0 !important;
            }
            
            .book {
                transform: none !important;
                transition: none !important;
            }

            .page-component {
                position: absolute !important; 
                width: 100% !important;
                height: 100% !important;
                transform: none !important;
                top: 0 !important;
                left: 0 !important;
            }

            .cover-front {
                border-radius: 12px !important;
                border-left: none !important; 
                box-shadow: 0 15px 40px rgba(0,0,0,0.6) !important;
                padding: 20px !important;
            }

            .gold-pattern {
                padding: 25px 20px !important; 
                border-width: 4px double #d4af37 !important;
            }

            .diamond-icon {
                font-size: 1.5rem !important; 
            }

            .book-title {
                font-size: 2.3rem !important; 
                letter-spacing: 6px !important;
                line-height: 1.5 !important;
            }

            .book-subtitle {
                font-size: 0.85rem !important;
                margin-top: 5px !important;
            }

            .inner-page-stay {
                border-radius: 12px !important;
                box-shadow: 0 15px 40px rgba(0,0,0,0.5) !important;
                background-image: none !important; 
                padding: 25px !important;
                
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
            }
            
            .inner-page-stay.mobile-active {
                opacity: 1;
                pointer-events: auto;
                z-index: 12; 
            }

            .answer-text {
                font-size: 1.6rem !important;
            }

            .cover-back-side, .cover-back {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="book" id="magicBook" onclick="toggleBook()">
            
            <div class="page-component cover-wrapper" id="frontCover">
                <div class="cover-front">
                    <div class="gold-pattern">
                        <div class="diamond-icon">❖</div>
                        <div class="book-title-area">
                            <div class="book-title">解答之書</div>
                            <div class="book-subtitle">THE BOOK OF ANSWERS</div>
                        </div>
                        <div class="diamond-icon">❖</div>
                    </div>
                </div>
                <div class="cover-back-side"></div>
            </div>

            <div class="page-component inner-page-stay" id="innerPage">
                <div class="answer-text" id="answerBox">載入中...</div>
            </div>

            <div class="page-component cover-back"></div>

        </div>
    </div>

    <script>
        let isOpen = false;
        let truths = [];

        async function loadAnswers() {
            try {
                const response = await fetch('truth.json');
                const data = await response.json();
                truths = data.truth;
                document.getElementById('answerBox').textContent = "";
            } catch (error) {
                console.error("無法讀取 JSON 檔案：", error);
                document.getElementById('answerBox').textContent = "未能讀取到答案庫";
            }
        }

        async function toggleBook() {
            const book = document.getElementById('magicBook');
            const frontCover = document.getElementById('frontCover');
            const innerPage = document.getElementById('innerPage');
            const answerBox = document.getElementById('answerBox');

            const isMobile = window.innerWidth <= 600;

            if (truths.length === 0) {
                await loadAnswers();
            }

            if (!isOpen) {
                if (truths.length > 0) {
                    const randomIndex = Math.floor(Math.random() * truths.length);
                    answerBox.textContent = truths[randomIndex];
                }

                if (isMobile) {
                    innerPage.classList.add('mobile-active');
                    answerBox.classList.add('show-text');
                } else {
                    book.classList.add('open-book');
                    frontCover.classList.add('flipped');
                    setTimeout(() => {
                        answerBox.classList.add('show-text');
                    }, 300);
                }

                isOpen = true;
            } else {
                if (isMobile) {
                    answerBox.classList.remove('show-text');
                    innerPage.classList.remove('mobile-active');
                } else {
                    answerBox.classList.remove('show-text');
                    setTimeout(() => {
                        frontCover.classList.remove('flipped');
                        book.classList.remove('open-book');
                    }, 100);
                }

                isOpen = false;
            }
        }

        loadAnswers();
    </script>
</body>
</html>
