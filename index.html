<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解答之書</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #3a4148 0%, #22272c 100%);
            display: grid;
            place-items: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            padding: 20px;
            outline: none; 
            font-family: 'Noto Serif TC', serif;
        }

        /* 3D 場景容器 */
        .scene {
            width: 600px; 
            height: 750px; 
            aspect-ratio: 4 / 5; 
            perspective: 2500px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 書本主體 */
        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }

        /* 打開時書本右移置中 */
        .book.open-book {
            transform: translateX(50%);
        }

        /* 預設為絕對定位重疊 */
        .page-component {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
        }

        /* ==================== 1. 雙面複合封面外殼 ==================== */
        .cover-wrapper {
            width: calc(100% + 6px);
            height: calc(100% + 6px);
            top: -3px;
            left: -3px;
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 封面正面 */
        .cover-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d0d0d 0%, #1c1c1c 100%);
            border-left: 22px solid #000; 
            border-radius: 0 16px 16px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px; 
            box-shadow: 25px 20px 50px rgba(0,0,0,0.65);
            backface-visibility: hidden;
        }

        /* 封面背面 */
        .cover-back-side {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #111111;
            border-right: 22px solid #000;
            border-radius: 16px 0 0 16px;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            box-shadow: -25px 20px 50px rgba(0,0,0,0.65);
            background-image: linear-gradient(to left, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 10%);
        }

        /* 古典花框 */
        .gold-pattern {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #BDA369;
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none" stroke="white" stroke-width="3"><rect x="15" y="15" width="370" height="470" rx="4" stroke-width="4"/><rect x="25" y="25" width="350" height="450" rx="2" stroke-width="1.5"/><path d="M15,45 Q45,45 45,15 M385,45 Q355,45 355,15 M15,455 Q45,455 45,485 M385,455 Q355,455 355,485"/><path d="M160,22 L170,17 L230,17 L240,22 L230,27 L170,27 Z M160,478 L170,473 L230,473 L240,478 L230,483 L170,483 Z"/><path d="M22,160 L17,170 L17,230 L22,240 L27,230 L27,170 Z M378,160 L373,170 L373,230 L378,240 L383,230 L383,170 Z"/></svg>');
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none" stroke="white" stroke-width="3"><rect x="15" y="15" width="370" height="470" rx="4" stroke-width="4"/><rect x="25" y="25" width="350" height="450" rx="2" stroke-width="1.5"/><path d="M15,45 Q45,45 45,15 M385,45 Q355,45 355,15 M15,455 Q45,455 45,485 M385,455 Q355,455 355,485"/><path d="M160,22 L170,17 L230,17 L240,22 L230,27 L170,27 Z M160,478 L170,473 L230,473 L240,478 L230,483 L170,483 Z"/><path d="M22,160 L17,170 L17,230 L22,240 L27,230 L27,170 Z M378,160 L373,170 L373,230 L378,240 L383,230 L383,170 Z"/></svg>');
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 內容物容器 */
        .book-title-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            z-index: 2;
        }

        .book-title-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 書名 */
        .book-title {
            font-family: 'Noto Serif TC', serif;
            color: #BDA369;
            font-size: 3.8rem; 
            letter-spacing: 14px;
            text-align: center;
            line-height: 1.6;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9), 0 0 15px rgba(189, 163, 105, 0.3);
            font-weight: 700;
        }

        /* 副標題 */
        .book-subtitle {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 1.3rem; 
            color: #BDA369; 
            letter-spacing: 3px;
            margin-top: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            opacity: 0.85;
        }

        /* ==================== 2. 底層留白內頁 ==================== */
        .inner-page-stay {
            background-color: #fbf9f1;
            width: calc(100% - 2px);
            margin-left: 2px;
            border-radius: 0 14px 14px 0;
            z-index: 5;
            transform: rotateY(0deg);
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 35px; 
            overflow: hidden; 
            background-image: linear-gradient(to right, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.02) 6%, rgba(255,255,255,0.5) 9%, rgba(0,0,0,0) 15%);
            box-shadow: 5px 5px 30px rgba(0,0,0,0.4);
            position: relative;
        }

        /* 內頁古典細邊框設計 */
        .inner-page-stay::before {
            content: '';
            position: absolute;
            top: 25px;
            bottom: 25px;
            left: 25px;
            right: 25px;
            border: 1px solid rgba(59, 49, 33, 0.25);
            outline: 3px double rgba(59, 49, 33, 0.4);
            outline-offset: -8px;
            border-radius: 4px;
            pointer-events: none;
        }

        /* 雙語答案容器 */
        .answer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 80%;
            gap: 20px; 
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            user-select: none;
            z-index: 6;
        }

        /* 英文在上 */
        .eng-text {
            color: #3b3121; 
            font-size: 1.25rem; 
            line-height: 1.6;
            letter-spacing: 2px;
            text-align: center;
            font-weight: 400;
            text-transform: uppercase; 
        }

        /* 設計感分隔線 */
        .decor-line {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 20px;
            color: rgba(59, 49, 33, 0.6);
            position: relative;
        }
        
        .decor-line::before, .decor-line::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to var(--direction, right), rgba(59, 49, 33, 0.5), rgba(59, 49, 33, 0));
        }
        .decor-line::before { --direction: left; margin-right: 10px; }
        .decor-line::after { --direction: right; margin-left: 10px; }

        .decor-diamond {
            font-size: 0.6rem;
            transform: rotate(45deg);
            width: 8px;
            height: 8px;
            border: 1px solid #3b3121;
            background-color: #3b3121;
        }

        /* 中文在下 */
        .ch-text {
            color: #3b3121; 
            font-size: 1.15rem; 
            line-height: 1.8;
            letter-spacing: 4px; 
            text-align: center;
            font-weight: 600;
        }

        .show-text {
            opacity: 1;
        }

        /* ==================== 3. 封底 ==================== */
        .cover-back {
            background: #0d0d0d;
            border-radius: 0 16px 16px 0;
            z-index: 1;
        }

        /* 翻開狀態動畫 */
        .flipped {
            transform: rotateY(-170deg) !important;
        }

        /* ==================== 4. 用戶回饋功能（無頭提交至 Google 表單） ==================== */
        /* 右下角古典懸浮按鈕 */
        .feedback-fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 48px;
            height: 48px;
            background-color: #1c1c1c;
            border: 2px solid #BDA369;
            border-radius: 50%;
            color: #BDA369;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 999;
            transition: all 0.3s ease;
        }
        
        .feedback-fab:hover {
            background-color: #BDA369;
            color: #1c1c1c;
            transform: scale(1.05);
        }

        /* 隱藏彈出式回饋與提示遮罩 */
        .feedback-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .feedback-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 呼應網頁質感的古典卡片 */
        .feedback-card {
            background: linear-gradient(135deg, #1c1c1c 0%, #0f0f0f 100%);
            border: 2px solid #BDA369;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            color: #fbf9f1;
        }

        .feedback-card h3 {
            color: #BDA369;
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-size: 1.4rem;
            text-align: center;
        }

        .feedback-card label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: rgba(251, 249, 241, 0.7);
        }

        .feedback-card textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(189, 163, 105, 0.4);
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-family: inherit;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.3s;
            resize: none;
        }

        .feedback-card textarea:focus {
            border-color: #BDA369;
        }

        .feedback-btn {
            width: 100%;
            background: #BDA369;
            color: #111;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.3s;
        }

        .feedback-btn:hover {
            background: #d4bc85;
        }

        .feedback-btn:disabled {
            background: #555;
            color: #aaa;
            cursor: not-allowed;
        }

        .close-modal-btn {
            position: absolute;
            top: 12px;
            right: 15px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .close-modal-btn:hover {
            color: #BDA369;
        }

        /* 自訂古典風格的 Alert 彈窗（取代瀏覽器內建視窗） */
        .custom-alert-card {
            text-align: center;
            max-width: 320px;
            padding: 25px;
        }

        .custom-alert-card p {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .alert-confirm-btn {
            background: none;
            border: 1px solid #BDA369;
            color: #BDA369;
            padding: 8px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }

        .alert-confirm-btn:hover {
            background: #BDA369;
            color: #111;
        }

        /* ==================== 5. 手機版專屬優化佈局 ==================== */
        @media (max-width: 600px) {
            .scene {
                width: 88vw !important; 
                max-width: 380px !important; 
                height: auto !important;
                max-height: 65dvh !important; 
                aspect-ratio: 4 / 5 !important; 
                margin: 0 !important; 
                position: relative !important;
                top: 0 !important;
            }
            
            .book {
                transform: none !important;
                transition: none !important;
            }

            .cover-wrapper {
                width: 100% !important;
                height: 100% !important;
                top: 0 !important;
                left: 0 !important;
            }

            .page-component {
                position: absolute !important; 
                width: 100% !important;
                height: 100% !important;
                transform: none !important;
                top: 0 !important;
                left: 0 !important;
            }

            .cover-front {
                border-radius: 12px !important;
                border-left: none !important; 
                box-shadow: 0 15px 40px rgba(0,0,0,0.6) !important;
                padding: 15px !important; 
            }

            .gold-pattern {
                width: 100% !important;
                height: 100% !important;
            }

            .book-title {
                font-size: 2.2rem !important; 
                letter-spacing: 6px !important;
                line-height: 1.5 !important;
            }

            .book-subtitle {
                font-size: 0.8rem !important;
                margin-top: 5px !important;
            }

            .inner-page-stay {
                width: 100% !important;
                margin-left: 0 !important;
                border-radius: 12px !important;
                box-shadow: 0 15px 40px rgba(0,0,0,0.5) !important;
                background-image: none !important; 
                padding: 30px !important; 
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
            }

            .inner-page-stay::before {
                top: 15px;
                bottom: 15px;
                left: 15px;
                right: 15px;
                outline-offset: -5px;
            }
            
            .inner-page-stay.mobile-active {
                opacity: 1;
                pointer-events: auto;
                z-index: 12; 
            }

            .answer-container {
                max-width: 85% !important;
                gap: 12px !important;
            }

            .eng-text {
                font-size: 1.05rem !important;
            }

            .decor-line {
                width: 100px !important;
                height: 14px !important;
            }

            .ch-text {
                font-size: 0.95rem !important;
                letter-spacing: 3px !important;
            }

            .cover-back-side, .cover-back {
                display: none !important;
            }
        }
    </style>
</head>
<body tabindex="0">

    <div class="scene">
        <div class="book" id="magicBook" onclick="toggleBook()">
            
            <div class="page-component cover-wrapper" id="frontCover">
                <div class="cover-front">
                    <div class="gold-pattern"></div>
                    <div class="book-title-container">
                        <div class="book-title-area">
                            <div class="book-title">解答之書</div>
                            <div class="book-subtitle">THE BOOK OF ANSWERS</div>
                        </div>
                    </div>
                </div>
                <div class="cover-back-side"></div>
            </div>

            <div class="page-component inner-page-stay" id="innerPage">
                <div class="answer-container" id="answerBox">
                    <div class="eng-text" id="engText"></div>
                    <div class="decor-line">
                        <div class="decor-diamond"></div>
                    </div>
                    <div class="ch-text" id="chText">載入中...</div>
                </div>
            </div>

            <div class="page-component cover-back"></div>

        </div>
    </div>

    <div class="feedback-fab" onclick="openFeedback(event)" title="回饋意見">✉</div>

    <div class="feedback-modal" id="feedbackModal" onclick="closeFeedback()">
        <div class="feedback-card" onclick="event.stopPropagation()">
            <button type="button" class="close-modal-btn" onclick="closeFeedback()">×</button>
            <h3>給予回饋</h3>
            
            <label>回饋內容</label>
            <textarea id="feedbackMessage" rows="5" required placeholder="寫下您的想法或建議..."></textarea>
            
            <button type="button" class="feedback-btn" id="submitBtn" onclick="submitToGoogleForm()">送出回饋</button>
        </div>
    </div>

    <div class="feedback-modal" id="customAlertModal" onclick="closeCustomAlert()">
        <div class="feedback-card custom-alert-card" onclick="event.stopPropagation()">
            <h3 id="customAlertTitle">提示</h3>
            <p id="customAlertText">提示內容</p>
            <button type="button" class="alert-confirm-btn" onclick="closeCustomAlert()">確認</button>
        </div>
    </div>

    <script>
        let isOpen = false;
        let chTruths = [];
        let engTruths = [];

        // 💡 您的 Google Form 實體接收端參數
        const GOOGLE_FORM_ACTION_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeS9ZJvW3n6YF_K_YmO2mXmS6t04O8n76V9vP00L7Zg0-zH7w/formResponse";
        const GOOGLE_FORM_ENTRY_ID = "entry.1158097746"; 

        // 彈窗控制功能
        function openFeedback(e) {
            e.stopPropagation(); // 阻止觸發翻書效果
            document.getElementById('feedbackModal').classList.add('active');
        }

        function closeFeedback() {
            document.getElementById('feedbackModal').classList.remove('active');
        }

        // 自訂古典提示框顯示與關閉
        function showCustomAlert(title, text) {
            document.getElementById('customAlertTitle').textContent = title;
            document.getElementById('customAlertText').textContent = text;
            document.getElementById('customAlertModal').classList.add('active');
        }

        function closeCustomAlert() {
            document.getElementById('customAlertModal').classList.remove('active');
        }

        // 核心提交逻辑：透過 fetch 靜默上傳至 Google 表單
        function submitToGoogleForm() {
            const messageInput = document.getElementById('feedbackMessage');
            const message = messageInput.value.trim();
            const btn = document.getElementById('submitBtn');

            if (!message) {
                showCustomAlert("提示", "請填寫回饋內容再送出唷！");
                return;
            }

            // 防止用戶重複點擊
            btn.disabled = true;
            btn.textContent = "傳送中...";

            // 使用 FormData 包裹表單數據
            const formData = new FormData();
            formData.append(GOOGLE_FORM_ENTRY_ID, message);

            // mode: 'no-cors' 允許我們在不發生網頁轉跳的情況下將數據安全的送給 Google 表單
            fetch(GOOGLE_FORM_ACTION_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(() => {
                // 關閉輸入窗並清空
                messageInput.value = ""; 
                closeFeedback(); 
                
                // 延遲一下下彈出美麗的網頁置內置感謝視窗
                setTimeout(() => {
                    showCustomAlert("感謝", "非常感謝您的回饋！");
                }, 200);
            })
            .catch((err) => {
                console.error("提交失敗：", err);
                showCustomAlert("錯誤", "傳送失敗，請稍後再試。");
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = "送出回饋";
            });
        }

        // 讀取外部資料夾的 truth.json 與 EngTruth.json
        async function loadAllAnswers() {
            try {
                const [chRes, engRes] = await Promise.all([
                    fetch('truth.json'),
                    fetch('EngTruth.json')
                ]);
                
                const chData = await chRes.json();
                const engData = await engRes.json();
                
                chTruths = chData.truth;
                engTruths = engData.truth;

                document.getElementById('chText').textContent = "";
            } catch (error) {
                console.error("讀取 JSON 檔案失敗：", error);
                document.getElementById('chText').textContent = "未能讀取到中英文答案庫";
            }
        }

        async function toggleBook() {
            const book = document.getElementById('magicBook');
            const frontCover = document.getElementById('frontCover');
            const innerPage = document.getElementById('innerPage');
            const answerBox = document.getElementById('answerBox');

            const isMobile = window.innerWidth <= 600;

            if (chTruths.length === 0 || engTruths.length === 0) {
                await loadAllAnswers();
            }

            if (!isOpen) {
                if (chTruths.length > 0 && engTruths.length > 0) {
                    const minLength = Math.min(chTruths.length, engTruths.length);
                    const randomIndex = Math.floor(Math.random() * minLength);
                    
                    document.getElementById('engText').textContent = engTruths[randomIndex];
                    document.getElementById('chText').textContent = chTruths[randomIndex];
                }

                if (isMobile) {
                    innerPage.classList.add('mobile-active');
                    answerBox.classList.add('show-text');
                } else {
                    book.classList.add('open-book');
                    frontCover.classList.add('flipped');
                    setTimeout(() => {
                        answerBox.classList.add('show-text');
                    }, 300);
                }
                isOpen = true;
            } else {
                if (isMobile) {
                    answerBox.classList.remove('show-text');
                    innerPage.classList.remove('mobile-active');
                } else {
                    answerBox.classList.remove('show-text');
                    setTimeout(() => {
                        frontCover.classList.remove('flipped');
                        book.classList.remove('open-book');
                    }, 100);
                }
                isOpen = false;
            }
        }

        window.addEventListener('keydown', function(e) {
            // 如果使用者正在打字回饋，不要觸發空白鍵翻書
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
                return;
            }
            if (e.key === ' ' || e.key === 'Spacebar' || e.code === 'Space' || e.keyCode === 32) {
                e.preventDefault(); 
                toggleBook();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadAllAnswers();
            document.body.focus();
        });
    </script>
</body>
</html>
